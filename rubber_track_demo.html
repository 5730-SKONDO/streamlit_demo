<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ゴムクローラ温度デモ</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body { font-family: sans-serif; background: #222; color: #fff; margin: 0; }
    .container { max-width: 700px; margin: auto; padding: 10px;}
    .input-group { margin-bottom: 10px; }
    label { margin-right: 5px; }
    #result { margin-bottom: 10px; }
    #chart { background: #fff; }
    #map { height: 300px; margin-top: 10px; }
    button { font-size: 1em; margin-right: 7px;}
  </style>
</head>
<body>
<div class="container">
  <h2>ゴムクローラ温度デモ</h2>
  <div class="input-group">
    <label>初期温度:</label>
    <select id="initTempMode">
      <option value="ambient">外気温適用</option>
      <option value="manual">手動入力</option>
    </select>
    <input type="number" id="initTemp" value="20" step="0.1" style="width:80px;">
    <label>W値:</label>
    <input type="number" id="Wval" value="1.0" step="0.01" style="width:80px;">
    <button id="startBtn">測定開始</button>
    <button id="stopBtn" disabled>測定終了</button>
  </div>
  <div id="result"></div>
  <canvas id="chart" width="600" height="200"></canvas>
  <div id="map"></div>
</div>

<!-- Leaflet.js for map -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<!-- Chart.js for graph -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
/* --- モデル定数 --- */
let W = 1.04; // 手動入力対応
const h = 1.9086;
const a = 0.01602;
const k1 = 0.1313;
const k2 = 0.0371;
const v_exp = 0.73;
const k_exp = 0.64;
const C = 551.74;

/* --- 計測データ管理 --- */
let running = false;
let gpsHistory = []; // {lat, lon, time}
let speedHistory = []; // km/h, 過去5秒分
let tempHistory = []; // 推定温度
let ambientTemp = 20;
let ambientTempTime = "";
let maxTemp = null;
let maxTempTime = "";
let chart = null;
let map = null;
let polyline = null;
let markers = [];
let timer = null;
let lastWeatherFetch = 0;
let lastLat = null, lastLon = null, lastTime = null;
let currentTemp = null;

/* --- 初期温度選択 --- */
document.getElementById('initTempMode').addEventListener('change', function() {
  document.getElementById('initTemp').disabled = (this.value !== "manual");
});

/* --- 測定開始・終了ボタン --- */
document.getElementById('startBtn').onclick = function() {
  W = parseFloat(document.getElementById('Wval').value);
  running = true;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;
  gpsHistory = [];
  speedHistory = [];
  tempHistory = [];
  maxTemp = null;
  maxTempTime = "";
  lastLat = null; lastLon = null; lastTime = null;
  currentTemp = null;
  // 地図初期化
  if (!map) {
    map = L.map('map').setView([35, 139], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);
  } else {
    map.setView([35, 139], 13);
    if (polyline) map.removeLayer(polyline);
    markers.forEach(m => map.removeLayer(m));
    markers = [];
  }
  polyline = L.polyline([], {color: "blue"}).addTo(map);
  // グラフ初期化
  if (!chart) {
    chart = new Chart(document.getElementById('chart').getContext('2d'), {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          { label: '速度(km/h)', data: [], borderColor: 'blue', yAxisID: 'y', fill: false},
          { label: '推定温度(℃)', data: [], borderColor: 'red', yAxisID: 'y1', fill: false}
        ]
      },
      options: {
        scales: {
          y: { type: 'linear', position: 'left', min:0, max:100 },
          y1: { type: 'linear', position: 'right', min:0, max:100 }
        }
      }
    });
  } else {
    chart.data.labels = [];
    chart.data.datasets[0].data = [];
    chart.data.datasets[1].data = [];
    chart.update();
  }
  // 初期温度設定
  if (document.getElementById('initTempMode').value === "manual") {
    currentTemp = parseFloat(document.getElementById('initTemp').value);
  } else {
    currentTemp = ambientTemp;
  }
  // 外気温取得
  fetchWeather();
  // メインループ開始
  timer = setInterval(mainLoop, 1000);
};
document.getElementById('stopBtn').onclick = function() {
  running = false;
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  clearInterval(timer);
};

/* --- 外気温API取得（1分ごと） --- */
async function fetchWeather() {
  if (!lastLat || !lastLon) return;
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lastLat}&longitude=${lastLon}&current_weather=true`;
    const res = await fetch(url);
    const data = await res.json();
    ambientTemp = data.current_weather.temperature;
    ambientTempTime = new Date().toLocaleString();
  } catch (e) {
    ambientTemp = 20;
    ambientTempTime = "取得失敗";
  }
}

/* --- GPS取得（watchPosition） --- */
navigator.geolocation.watchPosition(function(pos) {
  lastLat = pos.coords.latitude;
  lastLon = pos.coords.longitude;
  lastTime = Date.now();
}, function(err) {
  document.getElementById('result').innerHTML = "位置情報取得失敗: " + err.message;
}, {enableHighAccuracy:true});

/* --- メインループ（1秒ごと） --- */
function mainLoop() {
  if (!running || !lastLat || !lastLon) return;
  const now = new Date();
  // GPS履歴
  gpsHistory.push({lat: lastLat, lon: lastLon, time: now});
  if (gpsHistory.length > 300) gpsHistory.shift(); // 5分分だけ保持

  // 速度計算（過去5秒の移動平均）
  let avgSpeed = 0;
  if (gpsHistory.length >= 6) {
    const p1 = gpsHistory[gpsHistory.length-6];
    const p2 = gpsHistory[gpsHistory.length-1];
    const dist = haversine(p1.lat, p1.lon, p2.lat, p2.lon); // m
    avgSpeed = dist / 5 / 1000 * 3600; // km/h
  }
  speedHistory.push(avgSpeed);
  if (speedHistory.length > 300) speedHistory.shift();

  // 外気温APIは1分ごと
  if (Date.now() - lastWeatherFetch > 60000) {
    fetchWeather();
    lastWeatherFetch = Date.now();
  }

  // 温度推定（Rubber_Track_Temp）
  let v_now = avgSpeed / 3600; // km/h→km/s
  let T_env = ambientTemp;
  let dt = 1; // 秒
  let Q_in = W * (h + a * currentTemp) * Math.pow(v_now, v_exp);
  let Q_out = (k1 + k2 * Math.pow(v_now, k_exp)) * (currentTemp - T_env);
  let newTemp = currentTemp + ((Q_in - Q_out) / C) * dt;
  if (newTemp < T_env) newTemp = T_env;
  currentTemp = newTemp;
  tempHistory.push(currentTemp);
  if (tempHistory.length > 300) tempHistory.shift();

  // 最高温度
  if (maxTemp === null || currentTemp > maxTemp) {
    maxTemp = currentTemp;
    maxTempTime = now.toLocaleString();
  }

  // グラフ更新
  chart.data.labels.push(now.toLocaleTimeString());
  chart.data.datasets[0].data.push(avgSpeed);
  chart.data.datasets[1].data.push(currentTemp);
  if (chart.data.labels.length > 300) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
    chart.data.datasets[1].data.shift();
  }
  chart.update();

  // 地図更新（軌跡プロット）
  polyline.setLatLngs(gpsHistory.map(p => [p.lat, p.lon]));
  // 色分け（速度・温度で切り替え、ここは速度で青/温度で赤）
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  for (let i=0; i<gpsHistory.length; i+=10) {
    let val = chart.data.datasets[0].data[i] || 0; //速度
    let color = val > 10 ? 'red' : 'blue';
    markers.push(L.circleMarker([gpsHistory[i].lat, gpsHistory[i].lon], {radius:4, color:color}).addTo(map));
  }

  // 表示更新
  document.getElementById('result').innerHTML =
    `<b>現在時刻:</b> ${now.toLocaleString()}<br>
     <b>速度(5秒平均):</b> ${avgSpeed.toFixed(2)} km/h<br>
     <b>推定温度:</b> ${currentTemp.toFixed(2)} ℃<br>
     <b>緯度経度:</b> ${lastLat.toFixed(5)}, ${lastLon.toFixed(5)}<br>
     <b>外気温:</b> ${ambientTemp.toFixed(2)} ℃（取得時刻: ${ambientTempTime}）<br>
     <b>最高推定温度:</b> ${maxTemp.toFixed(2)} ℃（時刻: ${maxTempTime})`;
}

/* --- 距離計算（haversine） --- */
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000; // 地球半径(m)
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2-lat1);
  const dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
</script>
</body>
</html>
